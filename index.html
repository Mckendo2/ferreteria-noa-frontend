<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferretería NOA</title>
  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme !== 'dark') {
        document.documentElement.classList.add('light-mode');
      }
    })();
  </script>
</head>

<body>
  <div id="root">
    <!-- Splash screen -->
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #000000;">
      <img src="/src/assets/logo_premium.png" alt="Ferretería NOA Logo Professional" style="max-width: 450px; width: 90%; height: auto; animation: professionalPulse 4s infinite ease-in-out;">
      <style>
        @keyframes professionalPulse {
          0% { transform: scale(0.98); opacity: 0.6; filter: brightness(0.8) blur(1px); }
          50% { transform: scale(1.02); opacity: 1; filter: brightness(1.2) blur(0px); }
          100% { transform: scale(0.98); opacity: 0.6; filter: brightness(0.8) blur(1px); }
        }
      </style>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
